{% extends "manager/base.html" %}

{% block title %}{{ action }} Caixinha - DevBox Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <h3 class="mb-4">{{ action }} Caixinha em "{{ project.title }}"</h3>
        <div class="card p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="{{ form.title.id_for_label }}" class="form-label">{{ form.title.label }}</label>
                    {{ form.title }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.short_description.id_for_label }}" class="form-label">{{ form.short_description.label }}</label>
                    {{ form.short_description }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.content.id_for_label }}" class="form-label">{{ form.content.label }}</label>
                    {{ form.content }}
                </div>
                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'project_detail' project.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Caixinha</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
