{% extends "manager/base.html" %}

{% block title %}Login - DevBox Manager{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <h1 class="display-5 fw-bold"><i class="bi bi-box-seam text-primary"></i> DevBox</h1>
            <p class="text-muted">Seu organizador de conhecimento técnico</p>
        </div>
        <div class="card p-4">
            <h3 class="mb-4 text-center">Acesso Seguro</h3>
            <form method="post">
                {% csrf_token %}
                {% if form.errors %}
                <div class="alert alert-danger">Usuário ou senha incorretos.</div>
                {% endif %}
                <div class="mb-3">
                    <label class="form-label">Nome de Usuário</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mt-3">Entrar no Sistema</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
